# v2.nexus-x.site -> nexus_v2_app:3000
# Eta nexus_nginx container er /etc/nginx/conf.d/ folder e copy hobe.

server {
    listen 80;
    server_name v2.nexus-x.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name v2.nexus-x.site;

    ssl_certificate     /etc/letsencrypt/live/v2.nexus-x.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/v2.nexus-x.site/privkey.pem;

    client_max_body_size 50M;
    keepalive_timeout 75;
    keepalive_requests 1000;

    gzip on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml image/x-icon;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Docker internal DNS
    resolver 127.0.0.11 valid=30s;

    location / {
        proxy_pass http://nexus_v2_app:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }
}
